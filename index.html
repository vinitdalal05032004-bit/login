<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
    }

    .login-card {
      width: min(360px, 90vw);
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      text-align: center;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      color: #111827;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
    }

    input:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }

    button {
      margin-top: 8px;
      padding: 10px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Login</h1>
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Sign in</button>
    </form>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
